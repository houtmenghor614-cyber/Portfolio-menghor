<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <!-- Button to open popup -->
    <button id="openBtn" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
        Show Alert
    </button>

    <!-- Popup -->
    <div id="popup" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">
        <div class="bg-white p-6 rounded-lg shadow-lg w-80 relative">
            <!-- Close Button -->
            <button id="closeBtn" class="absolute top-2 right-2 text-gray-500 hover:text-gray-700 font-bold">
                ✕
            </button>

            <!-- Alert Content -->
            <h2 class="text-lg font-bold mb-2 text-center">Hello!</h2>
            <p class="text-gray-700 text-center">This is a beautiful custom alert you can style with Tailwind.</p>
        </div>
    </div>
    <script>
        const popup = document.getElementById("popup");
        const openBtn = document.getElementById("openBtn");
        const closeBtn = document.getElementById("closeBtn");

        // Show popup
        openBtn.addEventListener("click", function () {
            popup.classList.remove("hidden");
        });

        // Hide popup when clicking close button
        closeBtn.addEventListener("click", function () {
            popup.classList.add("hidden");
        });

        // Optional: Hide popup when clicking outside the box
        popup.addEventListener("click", function (e) {
            if (e.target === popup) {
                popup.classList.add("hidden");
            }
        });
    </script>
</body>

</html>
